<style>
  /* ===== BUTTON ===== */
  .country_btns_wrapper {
    padding: 15px;

    .country_btn {
      padding: 10px 16px;
      margin-right: 10px;
      cursor: pointer;
      background: white;
      font-weight: 700;
      color: #908f8f;
      font-family: "Rajdhani", sans-serif;
      border: 2px solid #31455700;
      font-size: 30px;
      border-radius: 5px;
      transition: all ease 0.5s;

      &.active {
        color: #314557;
        border: 2px solid #314557;
        border-radius: 5px;
      }
      &:hover {
        color: #314557;
        background: none;
      }
    }
  }

  /* ===== LIST ===== */
  .state_province_selector {
    position: sticky;
    top: 0;
    z-index: 10;
    margin-bottom: 20px;
  }

  #stateList {
    margin: 0 !important;
    padding: 0 !important;

    * {
      &::before {
        display: none;
      }
    }
  }

  .state_province_selector.vertical {
    display: flex;
    align-items: center;
    justify-content: center;

    .dropdown-header {
      width: 90%;
    }
  }

  .state_province_selector.chips {
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  /* ===== DROPDOWN ===== */
  .vertical {
    position: relative;
  }

  .dropdown-header {
    width: 90%;
    padding: 12px;
    border: 2px solid #333;
    background: #f0f0f0;
    cursor: pointer;
    margin: 0px !important;
    border-radius: 15px;
    max-width: 700px;
  }

  .dropdown-container {
    display: none;
  }

  .vertical.open .dropdown-container {
    display: flex;
    position: absolute;
    top: 100%;
    width: 90%;
    background: white;
    border: 2px solid #ccc;
    z-index: 999;
    max-width: 700px;
    border-radius: 15px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding-top: 5px;
    padding-bottom: 5px;

    li {
      width: calc((100% - 40px) / 5) !important;
      padding: 10px !important;
      cursor: pointer;
      border-radius: 15px;
      transition: all ease-in 0.1s;
      text-align: center !important;
      margin: 0px !important;

      &:hover {
        background: rgb(198, 189, 189);
      }
    }
  }

  @media (max-width: 767px) {
    .vertical.open .dropdown-container {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      justify-content: center;
      align-items: center;
      overflow-x: auto;
      max-height: 40dvh;

      li {
        width: calc((100% - 40px) / 3) !important;
        padding: 10px !important;
        border: 1px solid #333;
        border-radius: 20px;
        font-size: x-large;
        min-width: 100px;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
  }

  /* ===== CHIPS ===== */
  .chips {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px;

    li {
      padding: 8px 14px !important;
      border: 1px solid #333;
      border-radius: 20px;
      cursor: pointer;
      min-width: 70px !important;
      text-align: center !important;

      &.active {
        background: #333;
        color: white;
      }
    }
  }

  /* ===== MAP ===== */
  .country_maps {
    display: none;
    border: 1px solid #ccc;
    padding: 20px;
    margin-top: 10px;

    &.active {
      display: block;
    }

    .svg_wrapper {
      max-width: 1000px;

      .state {
        svg {
          width: 100%;
          height: auto;
        }
        path.location {
          fill: yellow;
          transition: all ease 0.2s;
          &:hover {
            fill: rgb(35, 140, 40);
          }
        }
        path.active {
          fill: red;
          color: white;
        }
      }
    }
  }

  #Canada_Map {
    svg {
      max-width: 800px;
    }
  }

  /* NEVER TOUCH THIS CODE ⬇️*/
  svg path {
    fill: #ddd;
    stroke: #333;
    stroke-width: 1.5;
    vector-effect: non-scaling-stroke;
  }
  /* NEVER TOUCH THIS CODE ⬆️*/
</style>
<button id="toggleView">Switch View</button>
<div id="map_control_wrapper">
  <div class="country_btns_wrapper">
    <button class="country_btn active" id="America_Btn">USA</button>
    <button class="country_btn" id="Canada_Btn">CANADA</button>
  </div>

  <div class="country_map_wrapper">
    <ul id="stateList" class="state_province_selector vertical"></ul>

    <div
      id="popup"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 101;
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        width: 320px;
        box-sizing: border-box;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 16px;
        "
      >
        <span style="font-size: 16px; font-weight: 500">팝업 제목</span>
        <button
          id="closeBtn"
          style="
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: none;
            cursor: pointer;
            font-size: 14px;
          "
        >
          ✕
        </button>
      </div>
      <p style="font-size: 14px; color: #666; margin: 0">
        팝업 내용이 들어갑니다.
      </p>
    </div>

    <!-- USA MAP -->
    <div class="country_maps active" id="America_Map">
      <svg viewBox="0 0 959 593" class="svg_wrapper">
        <g class="state"></g>
      </svg>
    </div>

    <!-- CANADA MAP -->
    <div class="country_maps" id="Canada_Map">
      <svg viewBox="-23500 -17050 50000 36500" class="svg_wrapper">
        <g class="state"></g>
      </svg>
    </div>
  </div>
</div>

<script>
  // sample states
  const americaStates = [
    "AL",
    "AK",
    "AZ",
    "AR",
    "CA",
    "CO",
    "CT",
    "DE",
    "FL",
    "GA",
    "HI",

    "ME",
    "MD",
    "MA",
    "MI",
    "MN",
    "MS",

    "NJ",
    "NM",
    "NY",
    "NC",
    "ND",
    "OH",
    "OK",

    "TX",
    "UT",
    "VT",
    "VA",
    "WA",
    "WV",
    "WI",
    "WY",
  ];

  //sample provinces
  const canadaProvinces = ["ON", "QC", "BC", "AB", "MB"];

  const americaBtn = document.getElementById("America_Btn");
  const canadaBtn = document.getElementById("Canada_Btn");

  const americaMap = document.getElementById("America_Map");
  const canadaMap = document.getElementById("Canada_Map");

  const stateList = document.getElementById("stateList");
  const toggleViewBtn = document.getElementById("toggleView");

  const popup = document.getElementById("popup");

  let currentCountry = "America";
  let currentMode = "vertical";
  let currentData = americaStates;
  let selectedValue = null;
  let isOpen = false;

  /* ===== HIGHLIGHT ===== */
  function highlightState(code) {
    document.querySelectorAll(".state .active").forEach((el) => {
      el.classList.remove("active");
    });

    const targetId = `${currentCountry}-${code}`;
    const target = document.getElementById(targetId);

    if (target) {
      target.classList.add("active");
    }
  }

  /* ===== HIGHLIGHT ===== */
  function highlightState_StateClick(code) {
    document.querySelectorAll(".state .active").forEach((el) => {
      el.classList.remove("active");
    });

    const targetId = code;
    const target = document.getElementById(targetId);

    if (target) {
      target.classList.add("active");
    }
  }

  /* ===== RENDER ===== */
  function renderList(data) {
    stateList.innerHTML = "";

    if (currentMode === "vertical") {
      stateList.classList.add("vertical");
      stateList.classList.remove("chips");

      const header = document.createElement("li");
      header.classList.add("dropdown-header");
      header.textContent = "Select State ▼";

      header.addEventListener("click", () => {
        isOpen = !isOpen;
        stateList.classList.toggle("open", isOpen);
      });

      const container = document.createElement("div");
      container.classList.add("dropdown-container");

      data.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;

        li.addEventListener("click", (e) => {
          e.stopPropagation();

          selectedValue = item;
          isOpen = false;

          highlightState(item);

          renderList(data);

          stateList.classList.toggle("open");
        });

        container.appendChild(li);
      });

      stateList.appendChild(header);
      stateList.appendChild(container);
    } else {
      stateList.classList.add("chips");
      stateList.classList.remove("vertical");

      data.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;

        if (item === selectedValue) {
          li.classList.add("active");
        }

        li.addEventListener("click", () => {
          selectedValue = item;

          highlightState(item);

          renderList(data);
        });

        stateList.appendChild(li);
      });
    }
  }

  /* ===== TOGGLE ===== */
  toggleViewBtn.addEventListener("click", () => {
    currentMode = currentMode === "vertical" ? "chips" : "vertical";
    isOpen = false;
    renderList(currentData);
  });

  /* ===== COUNTRY SWITCH ===== */
  function activateAmerica() {
    popupDisplayNone();

    currentCountry = "America";
    currentData = americaStates;
    selectedValue = null;

    americaBtn.classList.add("active");
    canadaBtn.classList.remove("active");

    americaMap.classList.add("active");
    canadaMap.classList.remove("active");

    highlightState(null);
    renderList(currentData);
  }

  function activateCanada() {
    popupDisplayNone();
    currentCountry = "Canada";
    currentData = canadaProvinces;
    selectedValue = null;

    canadaBtn.classList.add("active");
    americaBtn.classList.remove("active");

    canadaMap.classList.add("active");
    americaMap.classList.remove("active");

    highlightState(null);
    renderList(currentData);
  }

  americaBtn.addEventListener("click", activateAmerica);
  canadaBtn.addEventListener("click", activateCanada);

  /* ===== OUTSIDE CLICK ===== */
  document.addEventListener("click", (e) => {
    if (!stateList.contains(e.target)) {
      isOpen = false;
      stateList.classList.remove("open");
    }
  });

  function stateColor() {
    americaStates.forEach((el) => {
      const state_name = el;
      const target_div = document.getElementById(`America-${state_name}`);

      target_div.classList.add("location");
    });
    canadaProvinces.forEach((el) => {
      const state_name = el;

      const target_div = document.getElementById(`Canada-${state_name}`);

      target_div.classList.add("location");
    });
  }

  function popupDisplayNone() {
    popup.style.display = "none";
  }
  function popupDisplayOn() {
    popup.style.display = "block";
  }

  /* INIT */
  activateAmerica();
  stateColor();

  /* ===== MAP CLICK → LIST SYNC ===== */
  document.querySelectorAll(".state path.location").forEach((el) => {
    el.addEventListener("click", () => {
      const stateId = el.id;
      selectedValue = stateId;

      popupDisplayOn();

      //   popup.innerText = stateId;

      highlightState_StateClick(stateId);
      renderList(currentData);
    });
  });

  const maps = document.querySelector(".country_maps");

  const rect = maps.getBoundingClientRect();

  popup.style.position = "fixed";
  popup.style.top = `${rect.top + rect.height / 2}px`;
  popup.style.left = `${rect.left + rect.width / 2}px`;
  popup.style.transform = "translate(-50%, -50%)";
</script>
